{% extends "base.html" %}
{% block content %}
<h2>系统管理</h2>
<div class="grid-2">
    <div class="card">
        <h3>系统参数设置</h3>
        <div id="configList"><p style="color:#999;">加载中...</p></div>
        <button class="btn" onclick="saveConfig()" style="margin-top:1rem;">保存参数</button>
    </div>
    <div class="card">
        <h3>修改密码</h3>
        <div class="form-group"><label>原密码：</label><input type="password" id="oldPassword" placeholder="请输入原密码"></div>
        <div class="form-group"><label>新密码：</label><input type="password" id="newPassword" placeholder="请输入新密码"></div>
        <div class="form-group"><label>确认密码：</label><input type="password" id="confirmPassword" placeholder="请再次输入新密码"></div>
        <button class="btn" onclick="changePassword()">修改密码</button>
    </div>
</div>
<script>
function loadConfig() {
    fetch('/api/config').then(function(r) { return r.json(); }).then(function(data) {
        var c = document.getElementById('configList');
        if (data.success && data.data && data.data.length > 0) {
            c.innerHTML = data.data.map(function(item) {
                return '<div class="form-group"><label>' + item.description + '：</label><input type="text" id="cfg_' + item.config_key + '" value="' + item.config_value + '"></div>';
            }).join('');
        } else { c.innerHTML = '<p style="color:#999;">暂无参数</p>'; }
    });
}
function saveConfig() {
    var configs = {};
    document.querySelectorAll('[id^="cfg_"]').forEach(function(input) { configs[input.id.replace('cfg_', '')] = input.value; });
    fetch('/api/config/update', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(configs) })
    .then(function(r) { return r.json(); }).then(function(data) { showToast(data.message, data.success ? 'success' : 'error'); });
}
function changePassword() {
    var oldPwd = document.getElementById('oldPassword').value;
    var newPwd = document.getElementById('newPassword').value;
    var confirmPwd = document.getElementById('confirmPassword').value;
    if (!oldPwd || !newPwd) { showToast('请填写完整', 'error'); return; }
    if (newPwd !== confirmPwd) { showToast('两次密码不一致', 'error'); return; }
    fetch('/api/password/change', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({old_password: oldPwd, new_password: newPwd}) })
    .then(function(r) { return r.json(); }).then(function(data) {
        showToast(data.message, data.success ? 'success' : 'error');
        if (data.success) { document.getElementById('oldPassword').value = ''; document.getElementById('newPassword').value = ''; document.getElementById('confirmPassword').value = ''; }
    });
}
loadConfig();
</script>
{% endblock %}
