{% extends "base.html" %}

{% block content %}
<h2>⚙️ 系统管理</h2>

<div class="grid-2">
    <!-- 参数设置 -->
    <div class="card-box">
        <h3>系统参数设置</h3>
        <div id="configList"><p style="color:#999;">加载中...</p></div>
        <button onclick="saveConfig()">保存参数</button>
    </div>

    <!-- 修改密码 -->
    <div class="card-box">
        <h3>修改密码</h3>
        <label>原密码：</label>
        <input type="password" id="oldPassword" placeholder="请输入原密码">
        <label>新密码：</label>
        <input type="password" id="newPassword" placeholder="请输入新密码（至少6位）">
        <label>确认密码：</label>
        <input type="password" id="confirmPassword" placeholder="请再次输入新密码">
        <button onclick="changePassword()">修改密码</button>
    </div>
</div>

<script>
function loadConfig() {
    fetch('/api/config')
        .then(r => r.json())
        .then(data => {
            const container = document.getElementById('configList');
            if (data.success && data.data) {
                container.innerHTML = data.data.map(item => `
                    <div style="margin:8px 0;">
                        <label>${item.description}：</label>
                        <input type="text" id="config_${item.config_key}" value="${item.config_value}">
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<p style="color:#999;">暂无参数</p>';
            }
        });
}

function saveConfig() {
    const configs = {};
    document.querySelectorAll('[id^="config_"]').forEach(input => {
        const key = input.id.replace('config_', '');
        configs[key] = input.value;
    });
    fetch('/api/config/update', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(configs)
    })
    .then(r => r.json())
    .then(data => {
        alert(data.success ? '✅ 参数保存成功' : '❌ ' + data.message);
    });
}

function changePassword() {
    const oldPwd = document.getElementById('oldPassword').value;
    const newPwd = document.getElementById('newPassword').value;
    const confirmPwd = document.getElementById('confirmPassword').value;
    if (!oldPwd || !newPwd) { alert('请填写完整信息'); return; }
    if (newPwd !== confirmPwd) { alert('两次输入的新密码不一致'); return; }
    if (newPwd.length < 6) { alert('新密码长度不能少于6位'); return; }
    fetch('/api/password/change', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({old_password: oldPwd, new_password: newPwd})
    })
    .then(r => r.json())
    .then(data => {
        alert(data.success ? '✅ 密码修改成功' : '❌ ' + data.message);
        if (data.success) {
            document.getElementById('oldPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }
    });
}

window.onload = function() { loadConfig(); };
</script>
{% endblock %}
